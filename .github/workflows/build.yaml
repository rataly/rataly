name: Build README

on:
  push:
  workflow_dispatch:
  schedule:
    # Runs at 5:35 AM every Monday
    - cron: "35 5 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build README
        run: |
          npm start
          cat README.md

      - name: Commit and push if changed
        run: |
          git config --global user.email "ramazanatalay@gmail.com"
          git config --global user.name "Ramazan Atalay"
          git add README.md
          git diff --staged --quiet || git commit -m ":sparkles: feat(README.md): Updated README"
          git push

  # Generates the contribution snake animation into the `output` branch
  # The README references it from: /rataly/rataly/output/github-snake.svg
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: rataly
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
